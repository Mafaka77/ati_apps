name: training_apps
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.10.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.9.0
  intl: ^0.20.2
  get_storage: ^2.1.1
  google_fonts: ^8.0.0
  path_provider: ^2.1.4
  dropdown_search: ^6.0.2
  flutter_carousel_widget: ^3.1.0
  toggle_switch: ^2.3.0
  flutter_overlay_loader: ^2.0.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  animated_text_kit: ^4.2.2
  awesome_snackbar_content: ^0.1.1
  cached_network_image: ^3.4.1
  pull_to_refresh: ^2.0.0
  permission_handler: ^12.0.1
  pinput: ^6.0.1
  flutter_svg: ^2.2.3
  collection: ^1.18.0
  open_file: ^3.5.11
  ionicons: ^0.2.2
  change_app_package_name: ^1.5.0
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  flutter_local_notifications: ^20.0.0
  easy_date_timeline: ^2.0.9
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/images/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: SN Pro
      fonts:
        - asset: assets/fonts/SNPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/SNPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/SNPro-Bold.ttf
          weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
